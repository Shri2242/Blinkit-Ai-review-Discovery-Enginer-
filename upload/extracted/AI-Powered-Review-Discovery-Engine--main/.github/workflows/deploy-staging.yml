name: Deploy to Staging

on:
  push:
    branches:
      - main

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: review_engine_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create test database extensions
        run: |
          docker exec $(docker ps --filter ancestor=pgvector/pgvector:pg16 -q | head -n 1) psql -U postgres -d review_engine_test -c "CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\"; CREATE EXTENSION IF NOT EXISTS \"pg_trgm\"; CREATE EXTENSION IF NOT EXISTS \"vector\";"

      - name: Run database migrations
        run: pnpm db:migrate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/review_engine_test

      - name: Run tests (safety net)
        run: pnpm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/review_engine_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-jwt-secret-at-least-32-characters-long
          DEEPSEEK_API_KEY: sk-ci-placeholder
          MOCK_AI: 'true'
          S3_ENDPOINT: http://localhost:9000
          S3_ACCESS_KEY: minioadmin
          S3_SECRET_KEY: minioadmin
          S3_BUCKET: review-engine
          CHROMADB_URL: http://localhost:8000
          NODE_ENV: test

      - name: Build the Next.js frontend
        run: pnpm --filter @review-engine/web build

      # TODO: Deploy to Vercel (staging)
      # TODO: Deploy worker to Railway (staging)
      # TODO: Run database migrations on staging

      - name: Staging deployment placeholder
        run: echo "Staging deployment would happen here"

# =============================================================================
# ReviewPulse — Dependabot configuration
# =============================================================================
# IMPORTANT: GitHub reads Dependabot config ONLY from `.github/dependabot.yml`
# (or `.github/dependabot.yaml`). This copy lives at `.github/workflows/dependabot.yml`
# because the original task spec listed that path explicitly, but GitHub will
# NOT read it from here — the canonical, effective copy is at:
#
#     .github/dependabot.yml
#
# Both files are kept in sync. If you edit one, edit the other (or just delete
# this one and rely on the canonical copy).
#
# What this does:
#   - Checks npm (bun.lock is a normal lockfile Dependabot understands for
#     the npm ecosystem) for outdated dependencies every Monday.
#   - Opens pull requests grouped: one PR for dev dependencies, one for
#     production dependencies, so review noise stays low.
#   - Targets the `main` branch.
# =============================================================================

version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Kolkata"
    target-branch: "main"
    open-pull-requests-limit: 10
    groups:
      dev-dependencies:
        patterns:
          - "*"
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "@types/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "npm"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Kolkata"
    target-branch: "main"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"

# =============================================================================
# ReviewPulse — Deploy frontend to Vercel
# =============================================================================
# Deploys the Next.js app to Vercel on every push to `main`.
#
# Vercel builds the app itself (no `next build` here — the task forbids
# running build commands in CI, and Vercel's builder is the source of
# truth for the production artifact anyway).
#
# -----------------------------------------------------------------------------
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN       — A Vercel access token (Account Settings → Tokens).
#   VERCEL_ORG_ID      — Vercel team/org ID (the `.vercel/orgId` value, or
#                        find it at https://vercel.com/dashboard → Settings).
#   VERCEL_PROJECT_ID  — Vercel project ID (the `.vercel/projectId` value,
#                        or Project Settings → General → Project ID).
#
# The last two are read by the Vercel CLI as env vars (VERCEL_ORG_ID and
# VERCEL_PROJECT_ID) so the CLI knows which project to deploy without a
# committed `.vercel/` directory. If you prefer, you can commit
# `.vercel/project.json` instead and drop the two ID secrets.
# -----------------------------------------------------------------------------
#
# Manual deploys: run this workflow from the Actions tab (workflow_dispatch).
# =============================================================================

name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:
    # Allow manual deploys from the Actions tab.

permissions:
  contents: read

# Don't pile up concurrent deploys for the same branch — the latest push
# wins, older in-flight deploys are cancelled.
concurrency:
  group: deploy-vercel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy (production)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Install the Vercel CLI globally so `vercel deploy` is on PATH.
      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # `vercel deploy --prod --yes`:
      #   --prod   → deploy to production (not a preview URL).
      #   --yes    → skip all interactive prompts (use defaults from
      #              vercel.json + the project config).
      #   --token  → authenticate non-interactively.
      # VERCEL_ORG_ID + VERCEL_PROJECT_ID tell the CLI which project to
      # target (see the secrets comment at the top of this file).
      - name: Deploy to Vercel (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail
          DEPLOY_URL=$(vercel deploy --prod --token "${VERCEL_TOKEN}" --yes)
          echo "Production deployment URL: ${DEPLOY_URL}"
          echo "DEPLOY_URL=${DEPLOY_URL}" >> "$GITHUB_ENV"

      - name: Show deployment URL
        run: |
          echo "::notice::Deployed to ${DEPLOY_URL}"

# =============================================================================
# ReviewPulse — PR / push CI checks
# =============================================================================
# Runs on every pull request and on every push to `main`.
#
# Runs ESLint + a TypeScript type-check. No build step (the task explicitly
# forbids running build commands here — Vercel builds on deploy).
#
# NOTE on tests: this sandbox build intentionally contains NO test files
# (the sandbox prohibits test code), so `bun run test` is omitted. In the
# full monorepo version of ReviewPulse (apps/api, apps/web, packages/*),
# you would add a step here:
#
#   - name: Run tests
#     run: bun run test
#
# (The monorepo's root package.json wires Vitest workspaces via
# `bun run test`.)
# =============================================================================

name: PR checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Least-privilege: only need to read the checkout. No PR comments, no
# statuses writes beyond what GitHub auto-grants for check runs.
permissions:
  contents: read

# For PRs, cancel any superseded run on the same ref so devs get the
# latest signal fast. Pushes to main run to completion.
concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint-and-typecheck:
    name: Lint + typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      # `npm run lint` → `eslint .` (see package.json scripts).
      # ESLint config lives in eslint.config.mjs (flat config).
      - name: Run ESLint
        run: npm run lint

      # `nsc tsc --noEmit` type-checks the whole project without emitting
      # .js files. The repo has no dedicated `typecheck` script, so we call
      # tsc directly.
      - name: Type check (tsc --noEmit)
        run: npx tsc --noEmit
